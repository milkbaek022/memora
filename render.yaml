services:
  - type: web
    name: memora-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build --workspace @memora/api
    startCommand: npm run start --workspace @memora/api
    healthCheckPath: /health
    disk:
      name: memora-api-data
      mountPath: /opt/render/project/src/apps/api/data
      sizeGB: 1
    envVars:
      - key: AI_PROVIDER
        value: deepseek
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DATABASE_PATH
        value: /opt/render/project/src/apps/api/data/ai-learning.sqlite
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: MEMORA_MAIN_INVITE_CODE
        sync: false
